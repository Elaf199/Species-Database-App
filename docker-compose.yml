services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      FLASK_ENV: production
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_KEY: ${SUPABASE_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 5000), 5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  admin:
    build:
      context: .
      dockerfile: ReactDash/Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:5000}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-}
        VITE_SUPABASE_URL_TETUM: ${VITE_SUPABASE_URL_TETUM:-}
        VITE_SUPABASE_PUBLISHABLE_KEY_TETUM: ${VITE_SUPABASE_PUBLISHABLE_KEY_TETUM:-}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    depends_on:
      - backend
    ports:
      - "5173:80"
